# Binary dependency vetting policy
# All checks are PASS/FAIL. No advisory-only.
version: 1

gates:
  # ALL must PASS — any single FAIL = BLOCKED
  - id: license
    name: License is permissive
    type: hard
    permissive:
      - MIT
      - Apache-2.0
      - Apache-1.1
      - ISC
      - BSD-2-Clause
      - BSD-3-Clause
      - 0BSD
      - BlueOak-1.0.0
      - Unlicense
      - CC0-1.0
      - CC-BY-3.0
      - CC-BY-4.0
      - Zlib
      - PSF-2.0
      - Python-2.0
      - BSL-1.0
      - MPL-2.0
      - WTFPL
      - Artistic-2.0
      - PostgreSQL
      - X11
      - NCSA
      - ECL-2.0
    blocked:
      - GPL-2.0-only
      - GPL-3.0-only
      - AGPL-3.0-only
      - LGPL-2.1-only
      - LGPL-3.0-only
      - SSPL-1.0
      - BSL-1.1
    spdx_expressions: true  # handles "MIT OR Apache-2.0"

  - id: cve
    name: Zero high/critical CVEs
    type: hard
    source: osv.dev
    severity_floor: 7.0

  - id: install_scripts
    name: No install scripts
    type: hard
    blocked_hooks:
      - preinstall
      - postinstall
      - install

  - id: quarantine
    name: Published >= 7 days ago
    type: hard
    min_age_days: 7

  - id: registry_repo_match
    name: Registry metadata matches source repo
    type: hard

scored:
  # >= threshold must PASS
  threshold: 3

  - id: scorecard
    name: OpenSSF Scorecard >= 5.0
    floor: 5.0
    preferred: 7.0
    source: api.scorecard.dev

  - id: maintainers
    name: Multiple maintainers (>= 2)
    min_count: 2

  - id: post_xz
    name: Post-xz heuristic scan clean
    max_flags: 1
    checks:
      - solo_maintainer
      - binary_test_fixtures
      - build_beyond_compilation
      - social_pressure
      - activity_spike_dormant
      - typosquat_adjacent
      - signing_identity_mismatch

  - id: distro_inclusion
    name: Included in well-known registry
    registries:
      - npm
      - pypi
      - crates.io
      - brew-core

  - id: dep_depth
    name: Transitive dep count <= 500
    max_count: 500
    source: deps.dev

verdict:
  approved: all_gates_pass AND scored_pass >= threshold
  blocked: any_gate_fail OR scored_pass < threshold
