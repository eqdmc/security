# Binary dependency vetting policy with multi-signal CVE prioritization
# All checks are PASS/FAIL. No advisory-only.
#
# CVE gate uses CVE_Prioritizer quadrant model (arxiv:2506.01220):
#   Signal chain: KEV (confirmed exploited) -> EPSS (exploitation probability) -> CVSS (severity)
#   18x efficiency vs CVSS-alone triage while maintaining 85%+ exploitation coverage
version: 2

gates:
  # ALL must PASS -- any single FAIL = BLOCKED
  - id: license
    name: License is permissive
    type: hard
    permissive:
      - MIT
      - Apache-2.0
      - Apache-1.1
      - ISC
      - BSD-2-Clause
      - BSD-3-Clause
      - 0BSD
      - BlueOak-1.0.0
      - Unlicense
      - CC0-1.0
      - CC-BY-3.0
      - CC-BY-4.0
      - Zlib
      - PSF-2.0
      - Python-2.0
      - BSL-1.0
      - MPL-2.0
      - WTFPL
      - Artistic-2.0
      - PostgreSQL
      - X11
      - NCSA
      - ECL-2.0
    blocked:
      - GPL-2.0-only
      - GPL-3.0-only
      - AGPL-3.0-only
      - LGPL-2.1-only
      - LGPL-3.0-only
      - SSPL-1.0
      - BSL-1.1
    spdx_expressions: true

  - id: cve
    name: Zero P1+ or P1 vulnerabilities
    type: hard
    model: quadrant
    sources:
      cvss: osv.dev (database_specific.severity -> estimated numeric)
      epss: api.first.org/data/v1/epss
      kev: cisa.gov known-exploited-vulnerabilities.json
    quadrant:
      P1+: kev_listed (confirmed exploited in the wild)
      P1: cvss >= 6.0 AND epss >= 0.2 (high severity + high exploitation probability)
      P2: cvss >= 6.0 AND epss < 0.2 (high severity, low exploitation probability)
      P3: cvss < 6.0 AND epss >= 0.2 (low severity, high exploitation probability)
      P4: cvss < 6.0 AND epss < 0.2 (low severity, low exploitation probability)
    blocking: [P1+, P1]
    warn: [P2, P3]
    accept: [P4]
    thresholds:
      cvss_floor: 6.0
      epss_floor: 0.2
    # EPSS-unavailable fallback (no CVE ID to query):
    #   CRITICAL (cvss >= 9.0) → P1 (assume worst — conservative)
    #   HIGH (cvss >= 6.0) → P2 (warn; blocking all HIGH-noEPSS would
    #     overblock on severity-only data without exploitation signal)
    #   LOW/unknown → P4
    epss_unavailable:
      critical: P1
      high: P2
      low: P4

  - id: install_scripts
    name: No install scripts
    type: hard
    blocked_hooks:
      - preinstall
      - postinstall
      - install

  - id: quarantine
    name: Published >= 7 days ago
    type: hard
    min_age_days: 7

  - id: registry_repo_match
    name: Registry metadata matches source repo
    type: hard

  - id: flatpak_permissions
    name: Flatpak finish-args are safe (no sandbox-escape, no full-fs access)
    type: hard
    ecosystem: flathub
    dangerous:
      critical:
        - --filesystem=host
        - --filesystem=host-os
        - --filesystem=/
        - --talk-name=org.freedesktop.Flatpak
      high:
        - --filesystem=home
        - --socket=system-bus
    rules:
      max_critical: 0
      max_high_without_review: 1

scored:
  # >= threshold must PASS
  threshold: 3

  - id: scorecard
    name: OpenSSF Scorecard >= 5.0
    floor: 5.0
    preferred: 7.0
    source: api.scorecard.dev

  - id: maintainers
    name: Multiple maintainers (>= 2)
    min_count: 2

  - id: post_xz
    name: Post-xz heuristic scan clean
    max_flags: 1
    checks:
      - solo_maintainer
      - binary_test_fixtures
      - build_beyond_compilation
      - social_pressure
      - activity_spike_dormant
      - typosquat_adjacent
      - signing_identity_mismatch

  - id: distro_inclusion
    name: Included in well-known registry
    registries:
      - npm
      - pypi
      - crates.io
      - brew-core

  - id: dep_depth
    name: Transitive dep count <= 500
    max_count: 500
    source: deps.dev

verdict:
  approved: all_gates_pass AND scored_pass >= threshold
  blocked: any_gate_fail OR scored_pass < threshold
