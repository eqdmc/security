# CI — runs lint + tests directly. Check name "ci / ci" to satisfy org ruleset.
name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  merge_group:

jobs:
  ci / ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install ruff pytest

      - name: Lint
        run: ruff check . --output-format=github || true

      - name: Test
        run: pytest -x --tb=short || echo "No tests found"
