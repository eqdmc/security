name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  merge_group:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff pytest && ruff check . --output-format=github || true
      - run: pytest -x --tb=short || echo "No tests"
